name: SDK release dry run

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write

jobs:
  package:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 22, registry-url: 'https://registry.npmjs.org' }
      - uses: actions/setup-python@v5
        with: { python-version: '3.12' }
      - run: npm ci
      - run: npm run build --workspace @ols/types && npm run build --workspace @ols/sdk && npm run build --workspace @ols/cli
      - run: mkdir artifacts && npm pack --pack-destination artifacts --workspace @ols/schemas --workspace @ols/types --workspace @ols/sdk --workspace @ols/cli
      - run: python -m pip install build && python -m build python --outdir artifacts
      - uses: actions/upload-artifact@v4
        with: { name: ols-sdk-1.0.0, path: artifacts }
