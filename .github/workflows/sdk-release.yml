name: SDK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read
  id-token: write # Required for PyPI/npm OIDC

jobs:
  release-npm:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'
          
      - run: npm ci
      
      - run: npm run build --workspace @openliturgy/types && npm run build --workspace @openliturgy/sdk && npm run build --workspace @openliturgy/cli
      
      # Isolate npm artifacts
      - run: mkdir -p artifacts/npm
      - run: npm pack --pack-destination artifacts/npm --workspace @openliturgy/schemas --workspace @openliturgy/types --workspace @openliturgy/sdk --workspace @openliturgy/cli
      
      # Ensure using a recent version of npm supporting trusted publishing
      - run: npm install -g npm@latest
      
      # Publish TS workspaces to npm using OIDC trusted publishing (idempotent loop)
      - name: Publish to npm
        run: |
          for dir in packages/schemas packages/types packages/sdk packages/cli; do
            name=$(node -p "require('./$dir/package.json').name")
            version=$(node -p "require('./$dir/package.json').version")
            echo "Checking if $name@$version is already published..."
            if npm view "$name@$version" version >/dev/null 2>&1; then
              echo "$name@$version is already published on npm. Skipping."
            else
              echo "$name@$version is not published. Publishing..."
              npm publish "./$dir" --provenance --access public
            fi
          done

  release-pypi:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      # Isolate Python artifacts
      - run: mkdir -p artifacts/python
      - run: python -m pip install build && python -m build python --outdir artifacts/python
      
      # Publish strictly from the python directory to production PyPI
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: artifacts/python
